---
# Example hostvars for a web server node.
# `patch_services` is entirely optional - omit it (or leave it an empty
# list) on any host that has no services you want checked/stopped.

stop_services_before_patch: true   # set false to skip step 2 entirely

patch_services:
  - name: httpd
    type: webserver
    url: "http://{{ inventory_hostname }}:80"
    validate_certs: false

  - name: myapp
    type: generic        # started/stopped/verified, no URL or DB check

# Optional: package exclusions beyond the default docker*/containerd*
# exclude_packages:
#   - "docker*"
#   - "containerd*"
#   - "kernel*"           # example: pin kernel out of patch runs

